<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Demo Beauty Studio signature badge">
  <defs>
    <linearGradient id="halo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb5da"/>
      <stop offset="28%" stop-color="#ff7ebd"/>
      <stop offset="62%" stop-color="#cb7cff"/>
      <stop offset="100%" stop-color="#5f86ff"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.38" cy="0.32" r="0.9">
      <stop offset="0%" stop-color="#fffef6"/>
      <stop offset="40%" stop-color="#ffeef5"/>
      <stop offset="75%" stop-color="#f4eafa"/>
      <stop offset="100%" stop-color="#f1e7ff"/>
    </radialGradient>
    <linearGradient id="innerRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff9ff"/>
      <stop offset="45%" stop-color="#f6e4f5"/>
      <stop offset="100%" stop-color="#dae4ff"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#211028"/>
      <stop offset="45%" stop-color="#3d1830"/>
      <stop offset="100%" stop-color="#5d2038"/>
    </linearGradient>
    <linearGradient id="accentStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffdfbd"/>
      <stop offset="55%" stop-color="#ffd898"/>
      <stop offset="100%" stop-color="#ffb677"/>
    </linearGradient>
    <linearGradient id="flourish" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff96c1" stop-opacity="0.2"/>
      <stop offset="35%" stop-color="#ffb49d" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffcf7d"/>
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#ffe6a8"/>
    </linearGradient>
    <linearGradient id="petalGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7ff"/>
      <stop offset="60%" stop-color="#f5a8c5"/>
      <stop offset="100%" stop-color="#ffe4be"/>
    </linearGradient>
    <filter id="softShadow" x="-0.12" y="-0.12" width="1.24" height="1.24">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#c176ff" flood-opacity="0.35"/>
    </filter>
    <path id="topArc" d="M140 215 A 180 180 0 0 1 500 215"/>
    <path id="bottomArc" d="M500 425 A 180 180 0 0 1 140 425"/>
    <path id="petal" d="M0 -52 C 18 -26 26 0 0 52 C -26 0 -18 -26 0 -52 Z"/>
    <g id="sparkle">
      <path d="M0 -12 L2 -4 L12 0 L2 4 L0 12 L-2 4 L-12 0 L-2 -4 Z" fill="url(#sparkGradient)" opacity="0.9"/>
      <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.9"/>
    </g>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="320" cy="320" r="300" fill="url(#halo)"/>
    <circle cx="320" cy="320" r="294" fill="none" stroke="#ffeef8" stroke-width="6" opacity="0.7"/>
  </g>

  <circle cx="320" cy="320" r="278" fill="url(#bgGlow)"/>
  <circle cx="320" cy="320" r="260" fill="#ffffff" opacity="0.88" stroke="#fff8ff" stroke-width="6"/>
  <circle cx="320" cy="320" r="242" fill="url(#innerRing)" opacity="0.95"/>
  <circle cx="320" cy="320" r="226" fill="#ffffff" opacity="0.95"/>

  <circle cx="320" cy="320" r="210" fill="none" stroke="url(#accentStroke)" stroke-width="4" stroke-dasharray="28 22" stroke-linecap="round" opacity="0.85"/>
  <circle cx="320" cy="320" r="188" fill="none" stroke="#fff5f9" stroke-width="3" opacity="0.7"/>
  <circle cx="320" cy="320" r="154" fill="none" stroke="#f8d4f6" stroke-width="2" stroke-dasharray="8 12" opacity="0.6"/>

  <path d="M152 356c32-120 216-178 306-92 34 33 28 84-10 113-36 26-73 35-126 25" fill="none" stroke="url(#flourish)" stroke-width="7" stroke-linecap="round"/>
  <path d="M456 204c36 44 41 101 12 148" fill="none" stroke="url(#accentStroke)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <g transform="translate(320 320)">
    <use href="#petal" fill="url(#petalGlow)" opacity="0.8" stroke="#fff7fb" stroke-width="1.5"/>
    <use href="#petal" fill="url(#petalGlow)" opacity="0.75" stroke="#fff7fb" stroke-width="1.5" transform="rotate(60) scale(0.9)"/>
    <use href="#petal" fill="url(#petalGlow)" opacity="0.75" stroke="#fff7fb" stroke-width="1.5" transform="rotate(120) scale(0.9)"/>
    <use href="#petal" fill="url(#petalGlow)" opacity="0.75" stroke="#fff7fb" stroke-width="1.5" transform="rotate(180) scale(0.9)"/>
    <use href="#petal" fill="url(#petalGlow)" opacity="0.75" stroke="#fff7fb" stroke-width="1.5" transform="rotate(240) scale(0.9)"/>
    <use href="#petal" fill="url(#petalGlow)" opacity="0.75" stroke="#fff7fb" stroke-width="1.5" transform="rotate(300) scale(0.9)"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#ffdfe9" stroke-width="6" opacity="0.8"/>
    <circle cx="0" cy="0" r="18" fill="#fff2f9" stroke="#ffd6ec" stroke-width="2"/>
  </g>

  <g opacity="0.7">
    <path d="M240 440c46 36 116 34 162-1" fill="none" stroke="#ffd5c7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="226" cy="374" r="7" fill="#fffaf1" stroke="#ffdfc1" stroke-width="2"/>
    <circle cx="414" cy="392" r="9" fill="#fff6ff" stroke="#ffd5f0" stroke-width="2"/>
    <circle cx="362" cy="212" r="6" fill="#fffef6" stroke="#fee0ad" stroke-width="2"/>
  </g>

  <g fill="#cfa1ff" opacity="0.65">
    <circle cx="176" cy="206" r="4"/>
    <circle cx="502" cy="260" r="5"/>
    <circle cx="490" cy="394" r="4"/>
    <circle cx="158" cy="404" r="4"/>
    <circle cx="320" cy="132" r="5"/>
  </g>

  <g>
    <use href="#sparkle" x="180" y="160" transform="scale(0.8)"/>
    <use href="#sparkle" x="480" y="168" transform="rotate(25 480 168) scale(0.9)"/>
    <use href="#sparkle" x="122" y="360" transform="rotate(-18 122 360) scale(0.7)"/>
    <use href="#sparkle" x="518" y="382" transform="rotate(12 518 382) scale(0.85)"/>
    <use href="#sparkle" x="320" y="120" transform="scale(0.75)"/>
  </g>

  <g fill="none" stroke="#ffd0f2" stroke-width="2.5" opacity="0.6">
    <path d="M210 240c32-30 70-44 110-40" stroke-linecap="round"/>
    <path d="M408 470c46-10 82-41 100-84" stroke-linecap="round"/>
  </g>

  <g fill="url(#textGradient)" text-anchor="middle">
    <text x="320" y="292" font-family="Bodoni Moda, Didot, 'Times New Roman', serif" font-size="128" letter-spacing="6" font-weight="700">
      DEMO
    </text>
    <text x="320" y="340" font-family="Manrope, 'Inter', 'Segoe UI', sans-serif" font-size="26" letter-spacing="10" font-weight="600">
      BEAUTY STUDIO
    </text>
    <text x="320" y="366" font-family="Manrope, 'Inter', 'Segoe UI', sans-serif" font-size="16" letter-spacing="6" opacity="0.65">
      EST. 2016
    </text>
  </g>

  <text fill="#b06aa0" font-family="Manrope, 'Inter', 'Segoe UI', sans-serif" font-size="18" letter-spacing="5">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ARTISTRY · COLOR · LUMINOSITY</textPath>
  </text>
  <text fill="#c186af" font-family="Manrope, 'Inter', 'Segoe UI', sans-serif" font-size="16" letter-spacing="8">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">BOTANICAL SKIN · SOFT POWER</textPath>
  </text>
</svg>
